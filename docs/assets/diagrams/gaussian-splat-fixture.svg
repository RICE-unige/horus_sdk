<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Gaussian splat fixture transport</title>
  <desc id="desc">Diagram showing HORUS Gaussian Splat fixture publisher, SDK registration, ROS chunk transport, HORUS MR cache, renderer, and pointcloud fallback.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1.5; filter: url(#shadow); }
      .sdk { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.4; }
      .ros { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.4; }
      .asset { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.4; }
      .mr { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1.4; }
      .fallback { fill: #ecfeff; stroke: #67e8f9; stroke-width: 1.4; }
      .title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 15px Inter, Segoe UI, Arial, sans-serif; fill: #111827; }
      .body { font: 500 12.5px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .small { font: 600 11.5px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .fallback-line { stroke: #0891b2; stroke-width: 2; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="660" rx="24" />
  <text class="title" x="40" y="56">Gaussian splat fixture data path</text>
  <text class="body" x="40" y="82">The fixture keeps HORUS-native ROS registration and chunk transport. The preview pointcloud remains available as a fallback.</text>

  <rect class="panel" x="48" y="124" width="1024" height="430" rx="22" />

  <rect class="asset" x="92" y="188" width="202" height="90" rx="16" />
  <text class="label" x="118" y="218">Runtime PLY subset</text>
  <text class="body" x="118" y="242">Small or dense fixture</text>
  <text class="body" x="118" y="260">with SHA-256 hash</text>

  <rect class="sdk" x="92" y="354" width="202" height="90" rx="16" />
  <text class="label" x="118" y="384">SDK registration</text>
  <text class="body" x="118" y="408">gaussian_splat layer</text>
  <text class="body" x="118" y="426">plus render options</text>

  <rect class="ros" x="390" y="158" width="234" height="92" rx="16" />
  <text class="label" x="416" y="188">Manifest topic</text>
  <text class="body" x="416" y="212">/horus/gaussian_splat/manifest</text>
  <text class="body" x="416" y="230">asset id, hash, bytes, frame</text>

  <rect class="ros" x="390" y="290" width="234" height="92" rx="16" />
  <text class="label" x="416" y="320">ROS chunk topics</text>
  <text class="body" x="416" y="344">chunk_begin, chunk_item,</text>
  <text class="body" x="416" y="362">chunk_end</text>

  <rect class="fallback" x="390" y="422" width="234" height="92" rx="16" />
  <text class="label" x="416" y="452">Pointcloud preview</text>
  <text class="body" x="416" y="476">/map_gaussian_splat_preview</text>
  <text class="body" x="416" y="494">same map frame</text>

  <rect class="mr" x="718" y="158" width="256" height="92" rx="16" />
  <text class="label" x="744" y="188">HORUS MR cache</text>
  <text class="body" x="744" y="212">Verify byte count and hash</text>
  <text class="body" x="744" y="230">then load from persistent path</text>

  <rect class="mr" x="718" y="290" width="256" height="92" rx="16" />
  <text class="label" x="744" y="320">Gaussian renderer</text>
  <text class="body" x="744" y="344">Workspace map transform</text>
  <text class="body" x="744" y="362">plus configured diagnostics</text>

  <rect class="fallback" x="718" y="422" width="256" height="92" rx="16" />
  <text class="label" x="744" y="452">Fallback path</text>
  <text class="body" x="744" y="476">Show preview if load, cache,</text>
  <text class="body" x="744" y="494">or renderer validation fails</text>

  <path class="line" d="M294 232 H390" />
  <path class="line" d="M294 399 C336 399 348 336 390 336" />
  <path class="line" d="M624 204 H718" />
  <path class="line" d="M624 336 H718" />
  <path class="line" d="M846 250 V290" />
  <path class="fallback-line" d="M624 468 H718" />
  <path class="fallback-line" d="M846 382 V422" />

  <text class="small" x="92" y="594">Debug order: small fixture, debug_points, splats, dense fixture. If debug_points is stable but splats swim, inspect XR projection and covariance math.</text>
</svg>
